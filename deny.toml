# cargo-deny configuration.
#
# Enforces the blueprint's hard rules in CI:
#   - Only OSI-approved licenses (preference: MIT / Apache-2.0 / BSD).
#   - No OpenSSL or other unnecessary C dependencies.
#   - No known-vulnerable or unmaintained dependencies.

[advisories]
version = 2
yanked = "deny"
# Add advisory IDs here only with a documented justification and a tracking issue.
ignore = [
    # RUSTSEC-2026-0173: proc-macro-error2 is unmaintained. It is a build-time-only
    # proc-macro helper pulled transitively through biscuit-quote -> biscuit-auth
    # (the datalog macros). biscuit-auth 6.0 cannot build with that feature
    # disabled (an upstream bug), and no upgrade is available. Not a vulnerability;
    # no runtime impact. Tracked in issue #13; revisit when biscuit-auth updates.
    "RUSTSEC-2026-0173",
]

[licenses]
version = 2
# Licenses explicitly allowed across the workspace and its dependency tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    # First-party core crates are licensed under AGPL-3.0-or-later.
    "AGPL-3.0-or-later",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Hard ban on OpenSSL: the project is TLS-via-rustls, statically linked, no C TLS.
deny = [
    { name = "openssl" },
    { name = "openssl-sys" },
    { name = "native-tls" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
