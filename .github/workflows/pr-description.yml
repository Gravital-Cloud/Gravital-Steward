name: PR Description

# Generates a concise change descriptor for a pull request from its commits.
#
# Deterministic and dependency-free. The generated description is hard-capped at
# MAX_DESCRIPTION_CHARS (256) characters: GitHub enforces a 256-character limit
# on the pull-request *title*, and this project applies the same ceiling to the
# auto-generated body so PR creation can never fail on length. Raise the constant
# in the script below to allow longer descriptions.
#
# To avoid clobbering a human-written description, the workflow only writes when
# the PR body is empty or was previously written by this workflow (detected via
# the marker). It does not run on 'edited' events, so its own update never loops.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-description-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  describe:
    runs-on: ubuntu-latest
    if: github.event.sender.type != 'Bot'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const MAX_DESCRIPTION_CHARS = 256; // GitHub PR title limit; applied here to the body.
            const marker = '<!-- auto-descriptor -->';
            const { owner, repo } = context.repo;
            const number = context.payload.pull_request.number;
            const current = context.payload.pull_request.body || '';

            // Respect a human-authored body: only write when empty or bot-owned.
            if (current.trim() !== '' && !current.includes(marker)) {
              core.info('PR has a human-written body; leaving it untouched.');
              return;
            }

            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              { owner, repo, pull_number: number, per_page: 100 }
            );

            // Strip the Conventional Commit type/scope prefix to get a readable summary.
            const re = /^(\w+)(?:\([^)]+\))?(?:!)?:\s*(.+)$/;
            const summaries = [];
            for (const c of commits) {
              const subject = c.commit.message.split('\n')[0].trim();
              const m = subject.match(re);
              summaries.push(m ? m[2] : subject);
            }

            // De-duplicate while preserving order.
            const seen = new Set();
            const unique = summaries.filter((s) => {
              const k = s.toLowerCase();
              if (seen.has(k)) return false;
              seen.add(k);
              return true;
            });

            const lead = `${commits.length} commit(s): `;
            let joined = unique.join('; ');
            if (joined.length > 0) joined = joined[0].toUpperCase() + joined.slice(1);
            let text = `${lead}${joined}.`;

            // Hard cap, truncating on a word boundary with an ellipsis. The marker
            // is appended after the cap and does not count against readable text.
            const budget = MAX_DESCRIPTION_CHARS - marker.length - 1; // 1 for the newline
            if (text.length > budget) {
              let cut = text.slice(0, budget - 1);
              const lastSpace = cut.lastIndexOf(' ');
              if (lastSpace > budget * 0.5) cut = cut.slice(0, lastSpace);
              text = `${cut.replace(/[\s;,.]+$/, '')}…`;
            }

            const newBody = `${text}\n${marker}`;
            if (newBody.length > MAX_DESCRIPTION_CHARS) {
              core.setFailed(`Generated description ${newBody.length} > ${MAX_DESCRIPTION_CHARS} chars.`);
              return;
            }
            if (newBody.trim() === current.trim()) {
              core.info('PR description already up to date.');
              return;
            }

            await github.rest.pulls.update({ owner, repo, pull_number: number, body: newBody });
            core.info(`Updated PR description (${newBody.length} chars).`);
