name: PR Description

# Auto-generates a detailed, structured description in the pull-request *body*
# from the branch's commits, and keeps the *title* within GitHub's 256-character
# limit (the title is what rejects PR creation when it is too long; the body
# accepts up to ~65k characters).
#
# The generated body groups changes by Conventional Commit type and lists any
# referenced issues (resolved or related) with their titles and state. It is
# deterministic and dependency-free. Author-written text above the marker is
# preserved; the workflow does not run on 'edited' events, so its own update
# never loops.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: read
  pull-requests: write

concurrency:
  group: pr-description-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  describe:
    runs-on: ubuntu-latest
    if: github.event.sender.type != 'Bot'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const TITLE_MAX = 256;       // GitHub hard limit on the PR title.
            const BODY_MAX = 60000;      // Safety ceiling; GitHub allows ~65k.
            const marker = '<!-- auto-descriptor -->';
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const number = pr.number;

            // 1) Keep the title within the limit (truncate defensively).
            if (pr.title && pr.title.length > TITLE_MAX) {
              const title = pr.title.slice(0, TITLE_MAX - 1).replace(/\s+\S*$/, '') + '…';
              await github.rest.pulls.update({ owner, repo, pull_number: number, title });
              core.info(`Truncated title to ${title.length} chars.`);
            }

            // 2) Gather commits.
            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              { owner, repo, pull_number: number, per_page: 100 }
            );

            const groups = {
              feat: { title: 'Features', items: [] },
              fix: { title: 'Fixes', items: [] },
              perf: { title: 'Performance', items: [] },
              refactor: { title: 'Refactoring', items: [] },
              docs: { title: 'Documentation', items: [] },
              test: { title: 'Tests', items: [] },
              build: { title: 'Build', items: [] },
              ci: { title: 'CI', items: [] },
              chore: { title: 'Chores', items: [] },
              other: { title: 'Other', items: [] },
            };

            // Collect issue references across all commit messages.
            const closeRe = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const refRe = /(?:^|[^\w])#(\d+)\b/g;
            const resolves = new Set();
            const related = new Set();

            const subjectRe = /^(\w+)(?:\(([^)]+)\))?(!)?:\s*(.+)$/;
            for (const c of commits) {
              const msg = c.commit.message;
              const subject = msg.split('\n')[0].trim();
              const m = subject.match(subjectRe);
              if (m && groups[m[1]]) {
                const scope = m[2] ? `**${m[2]}**: ` : '';
                const bang = m[3] ? ' (breaking)' : '';
                groups[m[1]].items.push(`${scope}${m[4]}${bang}`);
              } else {
                groups.other.items.push(subject);
              }
              let mm;
              while ((mm = closeRe.exec(msg)) !== null) resolves.add(Number(mm[1]));
              while ((mm = refRe.exec(msg)) !== null) related.add(Number(mm[1]));
            }
            for (const n of resolves) related.delete(n);

            // Resolve issue titles/state for a richer "Issues" section.
            async function describeIssue(n) {
              try {
                const { data } = await github.rest.issues.get({ owner, repo, issue_number: n });
                const kind = data.pull_request ? 'PR' : 'issue';
                return `#${n} — ${data.title} (${kind}, ${data.state})`;
              } catch {
                return `#${n}`;
              }
            }

            // 3) Build the body.
            const out = [marker, '', '## Summary', ''];
            out.push(`This pull request contains ${commits.length} commit(s).`, '');

            for (const key of Object.keys(groups)) {
              const g = groups[key];
              if (g.items.length === 0) continue;
              out.push(`### ${g.title}`);
              for (const item of g.items) out.push(`- ${item}`);
              out.push('');
            }

            if (resolves.size > 0 || related.size > 0) {
              out.push('## Issues', '');
              if (resolves.size > 0) {
                out.push('### Resolved by this PR');
                for (const n of [...resolves].sort((a, b) => a - b)) {
                  out.push(`- Closes ${await describeIssue(n)}`);
                }
                out.push('');
              }
              if (related.size > 0) {
                out.push('### Related');
                for (const n of [...related].sort((a, b) => a - b)) {
                  out.push(`- ${await describeIssue(n)}`);
                }
                out.push('');
              }
            }

            out.push('---', '_Generated from commit messages. Edit text above the marker to add context._');
            let generated = out.join('\n');
            if (generated.length > BODY_MAX) generated = generated.slice(0, BODY_MAX - 1) + '…';

            // 4) Preserve any author-written content above the marker.
            const current = pr.body || '';
            const idx = current.indexOf(marker);
            const prefix = idx >= 0 ? current.slice(0, idx) : (current ? current + '\n\n' : '');
            const newBody = `${prefix}${generated}`;

            if (newBody.trim() === current.trim()) {
              core.info('PR body already up to date.');
              return;
            }
            await github.rest.pulls.update({ owner, repo, pull_number: number, body: newBody });
            core.info(`Updated PR description (${newBody.length} chars).`);
