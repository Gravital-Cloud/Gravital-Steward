name: PR Description

# Auto-generates a detailed, structured description in the pull-request *body*
# from the branch's commits and changed files, and keeps the *title* within
# GitHub's 256-character limit (the title is what blocks PR creation when it is
# too long; the body accepts ~65k characters).
#
# The body follows a professional template: Summary, Phase affected, Type of
# change (auto-checked), Related documents, What changed, Issues (resolved and
# related, with fetched titles), Test plan and a governance checklist. It is
# deterministic and dependency-free. Author text above the marker is preserved;
# the workflow does not run on 'edited' events, so its own update never loops.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: read
  pull-requests: write

concurrency:
  group: pr-description-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  describe:
    runs-on: ubuntu-latest
    if: github.event.sender.type != 'Bot'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const TITLE_MAX = 256;   // GitHub hard limit on the PR title.
            const BODY_MAX = 60000;  // Safety ceiling; GitHub allows ~65k.
            const marker = '<!-- auto-descriptor -->';
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const number = pr.number;

            // 1) Keep the title within the limit (truncate defensively).
            if (pr.title && pr.title.length > TITLE_MAX) {
              const title = pr.title.slice(0, TITLE_MAX - 1).replace(/\s+\S*$/, '') + '…';
              await github.rest.pulls.update({ owner, repo, pull_number: number, title });
              core.info(`Truncated title to ${title.length} chars.`);
            }

            // 2) Gather commits and changed files.
            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              { owner, repo, pull_number: number, per_page: 100 }
            );
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number: number, per_page: 100 }
            );

            const groups = {
              feat: { title: 'Features', items: [] },
              fix: { title: 'Fixes', items: [] },
              perf: { title: 'Performance', items: [] },
              refactor: { title: 'Refactoring', items: [] },
              docs: { title: 'Documentation', items: [] },
              test: { title: 'Tests', items: [] },
              build: { title: 'Build', items: [] },
              ci: { title: 'CI', items: [] },
              chore: { title: 'Chores', items: [] },
              other: { title: 'Other', items: [] },
            };

            const subjectRe = /^(\w+)(?:\(([^)]+)\))?(!)?:\s*(.+)$/;
            const closeRe = /\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            const refRe = /(?:^|[^\w])#(\d+)\b/g;
            const phaseRe = /\bPhase\s+[\w.-]+/gi;
            const docRefRe = /\b(?:RFC|ADR)-\d{3,4}\b/g;

            const resolves = new Set();
            const related = new Set();
            const phases = new Set();
            const docRefs = new Set();
            const typeCounts = {};

            for (const c of commits) {
              const msg = c.commit.message;
              const subject = msg.split('\n')[0].trim();
              const m = subject.match(subjectRe);
              if (m && groups[m[1]]) {
                typeCounts[m[1]] = (typeCounts[m[1]] || 0) + 1;
                const scope = m[2] ? `**${m[2]}**: ` : '';
                const bang = m[3] ? ' (breaking)' : '';
                groups[m[1]].items.push(`${scope}${m[4]}${bang}`);
              } else {
                groups.other.items.push(subject);
              }
              let mm;
              while ((mm = closeRe.exec(msg)) !== null) resolves.add(Number(mm[1]));
              while ((mm = refRe.exec(msg)) !== null) related.add(Number(mm[1]));
              while ((mm = phaseRe.exec(msg)) !== null) {
                phases.add(mm[0].replace(/\s+/g, ' ').replace(/[.,;:]+$/, ''));
              }
              while ((mm = docRefRe.exec(msg)) !== null) docRefs.add(mm[0]);
            }
            for (const n of resolves) related.delete(n);

            // Classify changed files.
            let additions = 0, deletions = 0;
            const docFiles = [];
            const touchedCrates = new Set();
            let touchedCi = false, touchedManifest = false, touchedTests = false;
            for (const f of files) {
              additions += f.additions || 0;
              deletions += f.deletions || 0;
              const p = f.filename;
              if (p.startsWith('docs/') || p.endsWith('.md')) docFiles.push(p);
              if (p.startsWith('.github/')) touchedCi = true;
              if (p.endsWith('Cargo.toml') || p.endsWith('deny.toml')) touchedManifest = true;
              if (/(^|\/)tests?\//.test(p) || /_test\.rs$/.test(p)) touchedTests = true;
              const crate = p.match(/^crates\/([^/]+)\//);
              if (crate) touchedCrates.add(crate[1]);
            }

            // Type-of-change detection.
            const isDocs = (typeCounts.docs || 0) > 0 || docFiles.length > 0;
            const isFeat = (typeCounts.feat || 0) > 0;
            const isFix = (typeCounts.fix || 0) > 0;
            const isRefactor = (typeCounts.refactor || 0) > 0 || (typeCounts.perf || 0) > 0;
            const isCi = (typeCounts.ci || 0) > 0 || (typeCounts.build || 0) > 0 || touchedCi || touchedManifest;
            const isTest = (typeCounts.test || 0) > 0 || touchedTests;

            async function describeIssue(n) {
              try {
                const { data } = await github.rest.issues.get({ owner, repo, issue_number: n });
                const kind = data.pull_request ? 'PR' : 'issue';
                return `#${n} — ${data.title} (${kind}, ${data.state})`;
              } catch {
                return `#${n}`;
              }
            }

            // 3) Build the body.
            const out = [marker, '', `## ${pr.title}`, ''];

            out.push('## Summary', '');
            const countParts = Object.keys(groups)
              .filter((k) => typeCounts[k])
              .map((k) => `${typeCounts[k]} ${k}`);
            out.push(
              `This pull request contains ${commits.length} commit(s)` +
                (countParts.length ? ` (${countParts.join(', ')})` : '') +
                `, touching ${files.length} file(s) (+${additions}/-${deletions}).`,
              ''
            );
            if (touchedCrates.size > 0) {
              out.push(`Crates affected: ${[...touchedCrates].sort().map((c) => `\`${c}\``).join(', ')}.`, '');
            }

            out.push('## Phase affected', '');
            out.push(phases.size > 0 ? [...phases].sort().join(', ') : 'Not specified — see linked issues.', '');

            out.push('## Type of change', '');
            const typeRows = [
              ['Documentation', isDocs],
              ['Feature implementation', isFeat],
              ['Bug fix', isFix],
              ['Refactor / performance', isRefactor],
              ['Build / CI / tooling', isCi],
              ['Tests', isTest],
            ];
            for (const [label, on] of typeRows) out.push(`- [${on ? 'x' : ' '}] ${label}`);
            out.push('');

            if (docFiles.length > 0 || docRefs.size > 0) {
              out.push('## Related documents', '');
              for (const p of [...new Set(docFiles)].sort()) out.push(`- \`${p}\``);
              if (docRefs.size > 0) out.push(`- Referenced: ${[...docRefs].sort().join(', ')}`);
              out.push('');
            }

            out.push('## What changed', '');
            for (const key of Object.keys(groups)) {
              const g = groups[key];
              if (g.items.length === 0) continue;
              out.push(`### ${g.title}`);
              for (const item of g.items) out.push(`- ${item}`);
              out.push('');
            }

            if (resolves.size > 0 || related.size > 0) {
              out.push('## Issues', '');
              if (resolves.size > 0) {
                out.push('### Resolved by this PR');
                for (const n of [...resolves].sort((a, b) => a - b)) out.push(`- Closes ${await describeIssue(n)}`);
                out.push('');
              }
              if (related.size > 0) {
                out.push('### Related');
                for (const n of [...related].sort((a, b) => a - b)) out.push(`- ${await describeIssue(n)}`);
                out.push('');
              }
            }

            out.push('## Test plan', '');
            for (const cmd of [
              'cargo fmt --all -- --check',
              'cargo clippy --workspace --all-targets -- -D warnings',
              'cargo test --workspace',
              'cargo build --workspace --target x86_64-unknown-linux-musl',
              'cargo deny check',
            ]) {
              out.push(`- [ ] \`${cmd}\``);
            }
            out.push('');

            out.push('## Checklist', '');
            for (const item of [
              'Documentation-driven: an RFC/ADR backs any new crate or decision',
              'Idempotency and reversibility upheld for effectful operations',
              'No new non-OSI dependencies; `cargo deny check` passes',
              'Commits follow Conventional Commits in English',
            ]) {
              out.push(`- [ ] ${item}`);
            }
            out.push('');

            out.push('---', '_Generated from the branch commits and changed files. Edit text above the marker to add context._');
            let generated = out.join('\n');
            if (generated.length > BODY_MAX) generated = generated.slice(0, BODY_MAX - 1) + '…';

            // 4) Preserve any author-written content above the marker.
            const current = pr.body || '';
            const idx = current.indexOf(marker);
            const prefix = idx >= 0 ? current.slice(0, idx) : (current ? current + '\n\n' : '');
            const newBody = `${prefix}${generated}`;

            if (newBody.trim() === current.trim()) {
              core.info('PR body already up to date.');
              return;
            }
            await github.rest.pulls.update({ owner, repo, pull_number: number, body: newBody });
            core.info(`Updated PR description (${newBody.length} chars).`);
